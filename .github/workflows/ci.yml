name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  php-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: none

      - name: PHP syntax lint
        run: find . -name "*.php" -not -path "./vendor/*" | xargs -n1 php -l
